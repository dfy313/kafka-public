version: "3.8"
services:
  kafka:
    image: confluentinc/cp-kafka:7.6.7
    container_name: kafka-kraft
    restart: unless-stopped
    ports:
      - "9092:9092" # broker
      - "9093:9093" # controller (optional to expose)
    environment:
      # --- KRaft core ---
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: "1"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-kraft:9093"
      # --- Networking / listeners ---
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://${PUBLIC_DNS}:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # --- Internal topics / features (single node)---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # --- Memory / paths ---
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx448m"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      # --- KRaft storage formatting ---
      CLUSTER_ID: "<GENERATED_CLUSTER_ID>" # Provide a stable cluster id for initial format
    volumes:
      - kafka_data:/var/lib/kafka/data
volumes:
  kafka_data:
